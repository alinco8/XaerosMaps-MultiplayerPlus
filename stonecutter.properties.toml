loomx.loom_version = "1.17-SNAPSHOT"

[mod]
id = "xmmp"
version = "0.1.0"
license = "MIT"
name = "Xaero's Maps: Multiplayer+"
description = "Adds more multiplayer features to Xaero's Minimap/World Map"
author = "alinco8"

[mod.links]
sources = "https://github.com/Alinco8/XaerosMaps-MultiplayerPlus"
homepage = "https://github.com/Alinco8/XaerosMaps-MultiplayerPlus"
issues = "https://github.com/Alinco8/XaerosMaps-MultiplayerPlus/issues"
forge_updates = "https://api.modrinth.com/updates/stTaMuWa/forge_updates.json"
neoforge_updates = "https://api.modrinth.com/updates/stTaMuWa/forge_updates.json?neoforge=only"

[publish]
modrinth.id = "stTaMuWa"
curseforge.id = 1525919

[libs]
night_config = "3.9.0"
zstd = "1.5.7-9"

[deps]
xaero_minimap = { version = "26.1.0", range = ">=25" }
xaero_world_map = { version = "1.41.2", range = ">=1.40" }
xaero_lib = { version = "1.1.15", range = ">=1.0" }

## Loader-specific dependencies

[fabric.deps]
fabric_loader = { version = "0.19.2", range = ">=0.19" }
fabric_language_kotlin = { version = "1.13.11+kotlin.2.3.21", range = ">=1" }

## Version-specific dependencies

["26.1.2".publish]
minecraft = ["26.1", "26.1.1", "26.1.2"]

["26.1.2".deps]
minecraft = { version = "26.1.2", range = ">=26" }
java = { version = "25", range = ">=25" }


["1.21.1".publish]
minecraft = ["1.21", "1.21.1", "1.21.2", "1.21.3", "1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "1.21.10", "1.21.11"]

["1.21.1".deps]
minecraft = { version = "1.21.1", range = "[1.21,1.22)" }
java = { version = "21", range = ">=21" }


["1.20.1".publish]
minecraft = ["1.20", "1.20.1", "1.20.2", "1.20.3", "1.20.4", "1.20.5", "1.20.6"]

["1.20.1".deps]
minecraft = { version = "1.21.1", range = "[1.20,1.21)" }
java = { version = "17", range = ">=17" }

## Version & loader-specific dependencies

[fabric."26.1.2".deps]
fabric_api = { version = "0.146.1+26.1.2", range = "*" }
modmenu = { version = "18.0.0-alpha.8", range = ">=18" }
yacl = { version = "3.8.2+26.1.0-fabric", range = ">=3" }

[neoforge."1.21.1".deps]
neoforge = { version = "21.1.234", range = "[21,22)" }
kff = { version = "5.12.0", range = "[5,)" }
yacl = { version = "3.8.2+1.21.1-neoforge", range = ">=3" }

[fabric."1.20.1".deps]
fabric_api = { version = "0.146.1+26.1.2", range = "*" }
modmenu = { version = "18.0.0-alpha.8", range = ">=18" }
